services:
  auth-api:
    build:
      context: ./AuthECAPI
      dockerfile: Dockerfile
    ports:
      - "5292:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DevDB=Server=sqlserver;Database=AuthECDB;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False
      - AppSettings__JWTSeecret=${JWT_SECRET}
    depends_on:
      - sqlserver

  auth-client:
    build:
      context: ./AuthECClient
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - auth-api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
