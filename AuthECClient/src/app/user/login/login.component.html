<div class="mb-4">
  <h2 class="test-success">
    Sign in
  </h2>
  <div>
    Don't have an account?
    <a routerLink="/signup" class="text-decoration-none fw-medium text-success d-inline-block">Sign up</a>
  </div>
</div>
<form [formGroup]="form">
  <div class="mb-3">
    <input class="form-control bg-body-secondary" 
    placeholder="Email" formControlName="email">
    <!-- @if (hasDisplayableError('email') && form.controls.email.hasError('required')) {
      <div class="error-feedback">
        Please enter your full name.
      </div>
    } -->
  </div>
  <div class="mb-3">
    <input class="form-control bg-body-secondary" 
    placeholder="Password" formControlName="password">
  </div>
  <div class="mt-4">
    <button type="submit" class="btn btn-success w-100 rounded-3">
      Sign in
    </button>
  </div>
</form>
