<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h5 class="modal-title">Edit Profile</h5>
      <button type="button" class="btn-close" (click)="close.emit()"></button>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" formControlName="fullName" (blur)="onBlurred()" />
          @if (hasDisplayableError('fullName')) {
            <div class="error-feedback">Full name is required.</div>
          }
        </div>
        <div class="mb-3">
          <label class="form-label">Age</label>
          <input type="text" class="form-control" formControlName="age" (blur)="onBlurred()" />
        </div>
        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select class="form-select" formControlName="gender" (blur)="onBlurred()">
            <option value="">Select</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Library ID</label>
          <input type="text" class="form-control" formControlName="libraryID" (blur)="onBlurred()" />
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close.emit()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
